site_name: CoshUI
site_description: A Declarative UI Library for Python
theme:
  name: material
  features:
    - content.code.copy
    - search.highlight
    - search.suggest
    - search.share
    - navigation.sections
  font: 
    text: Comfortaa
    code: JetBrains Mono
  logo: assets/images/coshui_logo.png
  favicon: assets/images/coshui.ico
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark Mode
      primary: black
      accent: deep purple
    
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light Mode
      primary: black
      accent: deep purple

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list

extra_css:
  - stylesheets/extra.css

